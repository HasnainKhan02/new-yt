<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <style>
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #d1f3ff, #e0ffe8);
      font-family: Arial, sans-serif;
    }

    .calculator {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
      width: 260px;
    }

    .display {
      height: 60px;
      width: 100%;
      background: #f5f5f5;
      text-align: right;
      font-size: 2rem;
      padding: 10px;
      border-radius: 10px;
      overflow: hidden;
      box-sizing: border-box;
      margin-bottom: 15px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 15px;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #e0e0e0;
      transition: 0.2s;
    }

    button:hover {
      background: #d5d5d5;
    }

    .operator {
      background-color: #ffc107;
    }

    .operator:hover {
      background-color: #ffb300;
    }

    .equal {
      background-color: #4caf50;
      color: white;
    }

    .equal:hover {
      background-color: #45a049;
    }

    .clear {
      background-color: #f44336;
      color: white;
    }

    .clear:hover {
      background-color: #e53935;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
      <button class="clear" id="clear">C</button>
      <button class="operator">/</button>
      <button class="operator">*</button>
      <button class="operator">-</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">+</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="equal" id="equal">=</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>0</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    const buttons = document.querySelectorAll(".buttons button");
    let currentInput = "";

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const value = btn.innerText;

        if (value === "C") {
          currentInput = "";
          display.innerText = "0";
        } 
        else if (value === "=") {
          try {
            currentInput = eval(currentInput).toString();
            display.innerText = currentInput;
          } catch {
            display.innerText = "Error";
            currentInput = "";
          }
        } 
        else {
          currentInput += value;
          display.innerText = currentInput;
        }
      });
    });
  </script>

</body>
</html>
