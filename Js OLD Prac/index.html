<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Calculator</title>
</head>

<body>
  <div class="container">
    <div class="inputs">
      <input type="number" id="num1" placeholder="Enter 1st Number" />
      <input type="number" id="num2" placeholder="Enter 2nd Number" />
      <h2 id="ans">ANS</h2>
    </div>

    <div class="buttons">
      <button class="btn" id="add">+</button>
      <button class="btn" id="subtract">-</button>
      <button class="btn" id="multi">*</button>
      <button class="btn" id="divide">/</button>
      <button class="btn" id="equal">=</button>
      <button class="btn" id="erase">⌫</button>
    </div>

    <div class="NumButtons">
      <button class="numBtn">1</button>
      <button class="numBtn">2</button>
      <button class="numBtn">3</button>
      <button class="numBtn">4</button>
      <button class="numBtn">5</button>
      <button class="numBtn">6</button>
      <button class="numBtn">7</button>
      <button class="numBtn">8</button>
      <button class="numBtn">9</button>
      <button class="numBtn">0</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
