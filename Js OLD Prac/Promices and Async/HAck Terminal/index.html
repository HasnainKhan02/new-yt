<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Hack Simulation</title>
</head>

<body>
    <div id="terminal"></div>

    <script>
        // Horror look
        document.body.style.background = "black";
        document.body.style.color = "red";
        document.body.style.padding = "20px";
        document.body.style.fontFamily = "monospace";
        document.body.style.fontSize = "22px";

        const terminal = document.getElementById("terminal");
        const messages = [
            "Initializing Hack Protocol",
            "Accessing Deep System Files",
            "Detected: Private Photos & Documents",
            "Injecting Ransomware Payload",
            "Erasing System Identity",
            "Disabling Firewall",
            "Final Phase: Overwriting Consciousness",
            "YOU ARE HACKED BOOOOOMMMM..."
        ];

        let delay = 0;

        // Background flash effect
        function flashBackground() {
            let flashes = 0;
            const flashInterval = setInterval(() => {
                document.body.style.background =
                    document.body.style.background === "black" ? "#300000" : "black";
                flashes++;
                if (flashes > 10) clearInterval(flashInterval);
            }, 100);
        }

        function startBlinking(line, message) {
            let dotCount = 0;
            const interval = setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                line.innerText = message + ".".repeat(dotCount);
            }, 300);
            return interval;
        }

        messages.forEach((msg, index) => {
            const randomDelay = Math.floor(Math.random() * 5000) + 1000;
            delay += randomDelay;
            setTimeout(() => {
                const line = document.createElement("div");
                terminal.appendChild(line);
                const blinkInterval = startBlinking(line, msg);
                setTimeout(() => {
                    clearInterval(blinkInterval);
                    line.innerText = msg + "...";
                    if (index === messages.length - 1) flashBackground();
                }, 3000);
            }, delay);
        });
    </script>
</body>

</html>
